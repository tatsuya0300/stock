data:
  source: "yfinance"          # "yfinance" | "jquants"
  db_path: "./data/jp_signal.sqlite"
  # 秘密情報は環境変数 JQUANTS_API_KEY / DISCORD_WEBHOOK で設定推奨
  #
  # yfinance は turnover=close*volume の近似。
  # 本番の sizing / market impact には使わないこと。
  # yfinance のまま本番相当処理を走らせるには
  # allow_approximate_turnover: true が必要（非推奨）。
  allow_approximate_turnover: false

universe:
  # 動作確認用サンプルをデフォルトにする。
  # 本番/本格BT前に JPX 公式 TOPIX500 構成を data/topix500.csv へ置き、
  # 下記を ./data/topix500.csv に変更すること。
  # 推奨列: code,name[,effective_from,effective_to]
  file: "./data/topix500_sample.csv"

model:
  lookback: 5
  top_n: 5

backtest:
  start: "2022-01-01"
  end:   "2024-12-31"
  impact_k_bp: 30.0    # 未較正（impact_k_is_calibrated=false）。パラメータサーチで調整のこと。
  impact_k_is_calibrated: false
  annual_interest_rate: 0.02
  short_lending_rate: 0.02
  adv_window: 20
  holding_days: 1
  commission_bp: 0.0
  half_spread_bp: 0.0
  output_dir: "./data/bt_out"
  # true のとき shortability 未確認の売りを BT でも許可（開発専用）
  allow_unconfirmed_short_in_bt: false

sizing:
  adv_ratio: 0.001
  adv_ratio_cap: 0.002
  market_open_unit_cap: 50
  unit: 100

risk:
  max_orders_per_day: 10
  max_gross_exposure_yen: 100000000
  max_single_name_exposure_yen: 20000000
  max_long_exposure_yen: 100000000
  max_short_exposure_yen: 100000000
  # 本番デフォルト: false（shortability 未確認の売りを出さない）
  allow_short_without_confirmed_shortability: false

notify:
  channel: "console"          # "console" | "discord"
  # discord_webhook: 環境変数 DISCORD_WEBHOOK で設定
  morning_time: "08:15"
  closing_time: "15:00"
