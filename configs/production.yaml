data:
  source: jquants
  jquants_plan: free
  price_vintage_mode: "point_in_time"
  db_path: "data/stock.db"
  strict_data_quality: true

universe:
  filter: TOPIX500
  min_price: 50
  max_price: 100000

backtest:
  start: "2024-01-01"
  end: "2024-12-31"
  initial_capital: 100_000_000
  impact_k_bp: 30.0
  annual_interest_rate: 0.02
  short_lending_rate: 0.02
  commission_bp: 0.0
  half_spread_bp: 0.0
  adv_window: 20
  min_adv_periods: 20
  require_liquidity_data: true
  maintain_margin_ratio: 0.25

risk:
  max_orders_per_day: 10
  max_gross_exposure_yen: 100_000_000
  max_single_name_exposure_yen: 20_000_000
  max_long_exposure_yen: 100_000_000
  max_short_exposure_yen: 100_000_000
  max_net_exposure_yen: 100_000_000
  allow_short_without_confirmed_shortability: false

sizing:
  adv_ratio: 0.001
  adv_ratio_cap: 0.01

notify:
  discord_webhook: ""
