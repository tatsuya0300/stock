[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
]
ignore = [
    "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["jp_signal"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = false
check_untyped_defs = false
disallow_untyped_defs = false
no_implicit_optional = false

[[tool.mypy.overrides]]
module = [
    "numpy.*",
    "pandas.*",
    "yfinance.*",
    "requests.*",
    "urllib3.*",
    "yaml.*",
    "jpholiday.*",
]
follow_imports = "skip"
follow_imports_for_stubs = true

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
