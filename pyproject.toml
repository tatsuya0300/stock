[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E,F: pyflakes/pycodestyle, I: isort, UP: pyupgrade, B: bugbear
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # 行長は line-length に委ねる（日本語コメントで超過しやすい）
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = false
check_untyped_defs = false

# サードパーティ製スタブ（numpy/pandas 等）の解析は追わない。
# ローカルの Python バージョンとスタブの組み合わせで無関係なエラーが出るのを防ぐ。
[[tool.mypy.overrides]]
module = ["numpy.*", "pandas.*", "yfinance.*", "requests.*", "urllib3.*", "yaml.*", "jpholiday.*"]
follow_imports = "skip"
follow_imports_for_stubs = true

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
